name: Deploy server

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: murray1974/msmserver

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build --no-cache -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "/opt/msm/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          FUEL_FINDER_CLIENT_ID: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
        with:
          host:            ${{ secrets.DEPLOY_HOST }}
          username:        ${{ secrets.DEPLOY_USER }}
          key:             ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          envs:            FUEL_FINDER_CLIENT_ID,FUEL_FINDER_CLIENT_SECRET
          script: |
            set -e
            cd /opt/msm
            # Inject Fuel Finder credentials into .env (add or replace)
            sed -i '/^FUEL_FINDER_CLIENT_ID=/d' .env
            sed -i '/^FUEL_FINDER_CLIENT_SECRET=/d' .env
            echo "FUEL_FINDER_CLIENT_ID=${FUEL_FINDER_CLIENT_ID}" >> .env
            echo "FUEL_FINDER_CLIENT_SECRET=${FUEL_FINDER_CLIENT_SECRET}" >> .env
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose stop app || true
            docker image rm ghcr.io/murray1974/msmserver:latest || true
            docker pull ghcr.io/murray1974/msmserver:latest
            docker compose up -d --no-build --force-recreate app
            sleep 8
            curl -sf http://127.0.0.1:8080/health || echo "Health check failed"
            echo "Deploy complete — $(date)"
