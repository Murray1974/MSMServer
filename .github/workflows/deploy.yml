name: Deploy server

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: murray1974/msmserver

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_built: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if source changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qvE '^\.github/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.changed == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        if: steps.check.outputs.changed == 'true'
        run: |
          docker build --no-cache -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.DEPLOY_HOST }}
          username:        ${{ secrets.DEPLOY_USER }}
          key:             ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/msm
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git fetch origin main
            git checkout origin/main -- docker-compose.yml
            docker compose stop app || true
            docker image rm ghcr.io/murray1974/msmserver:latest || true
            docker pull ghcr.io/murray1974/msmserver:latest
            docker compose up -d --no-build --force-recreate app
            sleep 8
            curl -sf http://127.0.0.1:8080/health || echo "Health check failed"
            echo "Deploy complete — $(date)"
