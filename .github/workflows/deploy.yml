name: Deploy server

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: murray1974/msmserver

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          echo "=== Building commit $(git rev-parse HEAD) ==="
          grep -n "fetchSlots called" Sources/App/Services/CalendarSyncService.swift && echo "✅ new log found" || echo "❌ new log NOT found"
          docker build --no-cache -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.DEPLOY_HOST }}
          username:        ${{ secrets.DEPLOY_USER }}
          key:             ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/msm
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "=== Stopping container ==="
            docker compose stop app || true
            echo "=== Removing old image ==="
            docker image rm ghcr.io/murray1974/msmserver:latest || echo "(image not found, that is fine)"
            echo "=== Pulling fresh image ==="
            docker pull ghcr.io/murray1974/msmserver:latest
            echo "=== Image digest after pull ==="
            docker inspect ghcr.io/murray1974/msmserver:latest --format='{{.Id}}'
            echo "=== Starting container ==="
            docker compose up -d --no-build --force-recreate app
            docker compose ps
            sleep 8
            echo "=== Health check ==="
            curl -sf http://127.0.0.1:8080/health || echo "Health check failed"
            echo "Deploy complete — $(date)"
