services:
  db:
    image: postgres:15
    container_name: msm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - msm_pgdata:/var/lib/postgresql/data
    # Change host port to avoid conflict:
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ghcr.io/murray1974/msmserver:latest
    build: .
    container_name: msm_server
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LOG_LEVEL: info
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      CALENDAR_ICS_URL: ${CALENDAR_ICS_URL}
      CALENDAR_TIMEZONE: ${CALENDAR_TIMEZONE:-Europe/London}
      # FCM_SERVICE_ACCOUNT_JSON: for CI/CD — set to the raw JSON string.
      # Locally, prefer dropping the file into .secrets/ (mounted below).
    volumes:
      - ./.secrets:/run/.secrets:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  msm_pgdata:
